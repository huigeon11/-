<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🌿 마음 테라피 플랫폼</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* 테마 변수 설정 */
        :root { 
            --main-color: #6d9773; 
            --bg-color: #f8f9fa; 
            --card-bg: #ffffff;
            --text-color: #333333;
            --sub-text: #666666;
            --accent-color: #e8f5e9; 
            --border-color: #eeeeee;
        }

        /* 다크모드 전용 변수 */
        [data-theme='dark'] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --sub-text: #b0b0b0;
            --accent-color: #2d3a2f;
            --border-color: #333333;
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            margin: 0; 
            background: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.6; 
            transition: background 0.3s, color 0.3s;
        }
        
        /* 네비게이션 */
        nav { 
            display: flex; justify-content: space-between; padding: 15px 10%; 
            background: var(--card-bg); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            position: sticky; top: 0; z-index: 100; align-items: center; 
        }
        .logo { font-weight: bold; color: var(--main-color); font-size: 22px; cursor: pointer; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { margin-left: 15px; text-decoration: none; color: var(--sub-text); cursor: pointer; font-weight: 500; font-size: 14px; }
        .user-info { font-size: 14px; color: var(--main-color); font-weight: bold; margin-right: 10px; }

        /* 다크모드 토글 버튼 */
        .theme-toggle {
            background: none; border: 1px solid var(--main-color); color: var(--main-color);
            padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 12px; margin-left: 15px; width: auto;
        }

        /* 메인 컨테이너 */
        .container { max-width: 1000px; margin: 40px auto; text-align: center; padding: 0 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .menu-card { 
            background: var(--card-bg); padding: 35px 20px; border-radius: 15px; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; 
            border: 1px solid transparent; color: var(--text-color);
        }
        .menu-card:hover { transform: translateY(-5px); border: 1px solid var(--main-color); }

        /* 섹션 공통 스타일 */
        .content-section { 
            display: none; background: var(--card-bg); padding: 40px; 
            border-radius: 20px; margin-top: 20px; text-align: left; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }
        .active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 회원가입/로그인 폼 */
        .auth-box { 
            max-width: 400px; margin: 50px auto; background: var(--card-bg); 
            padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        .auth-box h2 { text-align: center; color: var(--main-color); margin-bottom: 20px; }
        .auth-toggle { text-align: center; margin-top: 15px; font-size: 14px; color: var(--sub-text); cursor: pointer; text-decoration: underline; }

        /* 자료실 및 통계 */
        .doc-item { 
            background: var(--accent-color); padding: 18px; border-radius: 12px; 
            margin-bottom: 12px; border-left: 6px solid var(--main-color); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .stats-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .chart-box { background: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid var(--border-color); height: 300px; }
        
        /* 공통 UI */
        input, textarea, select { 
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border-color); 
            border-radius: 8px; box-sizing: border-box; background: var(--card-bg); color: var(--text-color);
        }
        button { padding: 12px 25px; background: var(--main-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-home { background: #9e9e9e; width: auto; margin-top: 20px; }
        
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; z-index: 1000; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); flex-direction: column; color: white; }
        video { width: 90%; max-width: 450px; border-radius: 15px; border: 3px solid var(--main-color); }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.reload()">🌿 마음 테라피</div>
        <div class="nav-links" id="nav-menu">
            <span id="user-display" class="user-info"></span>
            <a onclick="showSection('home')">홈</a>
            <a onclick="showSection('docs')">자료실</a>
            <a id="auth-btn" onclick="showSection('login')">로그인</a>
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 다크모드</button>
        </div>
    </nav>

    <div class="container">
        <div id="section-login" class="content-section">
            <div class="auth-box">
                <h2>로그인</h2>
                <input type="text" id="login-id" placeholder="아이디">
                <input type="password" id="login-pw" placeholder="비밀번호">
                <button onclick="handleLogin()">접속하기</button>
                <p class="auth-toggle" onclick="showSection('signup')">회원가입</p>
            </div>
        </div>

        <div id="section-signup" class="content-section">
            <div class="auth-box">
                <h2>회원가입</h2>
                <input type="text" id="reg-id" placeholder="아이디">
                <input type="password" id="reg-pw" placeholder="비밀번호">
                <input type="text" id="reg-name" placeholder="닉네임">
                <button onclick="handleSignup()">가입 완료</button>
                <p class="auth-toggle" onclick="showSection('login')">로그인으로 돌아가기</p>
            </div>
        </div>

        <div id="section-home" class="content-section active">
            <h1 id="welcome-msg">안녕하세요, 오늘의 마음은 어떤가요?</h1>
            <p style="color: var(--sub-text);">개인 맞춤형 감정 기록 서비스를 이용해 보세요.</p>
            <div class="menu-grid">
                <div class="menu-card" onclick="checkAuth('analysis')"><h3>🔍 감정탐색 시작</h3></div>
                <div class="menu-card" onclick="checkAuth('record')"><h3>📊 기분기록 확인</h3></div>
                <div class="menu-card" onclick="showSection('docs')"><h3>📚 감정탐색 자료보기</h3></div>
                <div class="menu-card" onclick="checkAuth('diary')"><h3>✏️ 감정일기 쓰기</h3></div>
                <div class="menu-card" onclick="showSection('community')"><h3>🤝 커뮤니티 참여</h3></div>
            </div>
        </div>

        <div id="section-docs" class="content-section">
            <h2>📚 전문 자료실</h2>
            <div id="docs-list"></div> <button onclick="showSection('home')" class="btn-home">홈으로</button>
        </div>

        <div id="section-record" class="content-section">
            <h2>📊 나의 기분 통계</h2>
            <div class="stats-container">
                <div class="chart-box"><canvas id="moodChart"></canvas></div>
                <div id="summary-list" style="padding:15px; background:var(--accent-color); border-radius:10px; overflow-y:auto; height:300px;"></div>
            </div>
            <button onclick="showSection('home')" class="btn-home">홈으로</button>
        </div>

        <div id="section-diary" class="content-section">
            <h2>✏️ 감정 일기 작성</h2>
            <select id="diary-score">
                <option value="5">매우 좋음 😊</option>
                <option value="3" selected>보통 😐</option>
                <option value="1">매우 힘듦 😢</option>
            </select>
            <textarea id="diary-content" rows="5" placeholder="오늘의 마음을 남겨주세요."></textarea>
            <button onclick="saveMood()">저장하기</button>
            <button onclick="showSection('home')" class="btn-home">홈으로</button>
        </div>

        <div id="section-community" class="content-section">
            <h2>🤝 마음 나눔 게시판</h2>
            <textarea id="board-msg" rows="3" placeholder="따뜻한 응원을 남겨보세요."></textarea>
            <button onclick="postMsg()">글 올리기</button>
            <div id="board-list" style="margin-top:20px;"></div>
            <button onclick="showSection('home')" class="btn-home">홈으로</button>
        </div>
    </div>

    <div id="analysis-window" class="modal-overlay">
        <h2>표정을 읽고 있습니다...</h2>
        <video id="video" autoplay muted></video>
        <h1 id="res-emotion">분석 중</h1>
        <button onclick="location.reload()" style="width:auto">종료</button>
    </div>

    <script>
        let currentUser = JSON.parse(sessionStorage.getItem('loginUser')) || null;
        let users = JSON.parse(localStorage.getItem('users')) || {};
        let moodRecords = JSON.parse(localStorage.getItem('moodRecords')) || {};
        let myChart = null;

        // 초기 테마 로드
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeButton(savedTheme);

        if(currentUser) updateAuthUI();

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            updateThemeButton(target);
            if(myChart) drawChart(); // 테마 변경 시 차트 다시 그리기 (색상 대응)
        }

        function updateThemeButton(theme) {
            const btn = document.getElementById('theme-btn');
            btn.innerText = theme === 'light' ? '🌙 다크모드' : '☀️ 라이트모드';
        }

        // --- 이하 기존 로직과 동일 ---
        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            if(id === 'record') drawChart();
        }

        function checkAuth(target) {
            if(!currentUser) { alert("로그인이 필요합니다."); showSection('login'); }
            else { if(target === 'analysis') openAnalysis(); else showSection(target); }
        }

        function handleSignup() {
            const id = document.getElementById('reg-id').value;
            const pw = document.getElementById('reg-pw').value;
            const name = document.getElementById('reg-name').value;
            if(!id || !pw || !name) return alert("항목을 채워주세요.");
            users[id] = { pw, name };
            localStorage.setItem('users', JSON.stringify(users));
            alert("가입 완료!"); showSection('login');
        }

        function handleLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            if(users[id] && users[id].pw === pw) {
                currentUser = { id, name: users[id].name };
                sessionStorage.setItem('loginUser', JSON.stringify(currentUser));
                updateAuthUI(); showSection('home');
            } else { alert("정보가 일치하지 않습니다."); }
        }

        function updateAuthUI() {
            document.getElementById('user-display').innerText = currentUser.name + "님";
            document.getElementById('auth-btn').innerText = "로그아웃";
            document.getElementById('auth-btn').onclick = () => { sessionStorage.removeItem('loginUser'); location.reload(); };
            document.getElementById('welcome-msg').innerText = currentUser.name + "님, 오늘 마음은 어떠세요?";
        }

        function saveMood() {
            const content = document.getElementById('diary-content').value;
            const score = parseInt(document.getElementById('diary-score').value);
            if(!content) return alert("내용을 입력하세요.");
            const date = new Date().toLocaleDateString();
            moodRecords[currentUser.id + "_" + date] = { id: currentUser.id, score, content, date };
            localStorage.setItem('moodRecords', JSON.stringify(moodRecords));
            alert("기록되었습니다."); showSection('home');
        }

        function drawChart() {
            const userId = currentUser.id;
            const userEntries = Object.keys(moodRecords)
                .filter(key => key.startsWith(userId + "_"))
                .map(key => moodRecords[key])
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            const ctx = document.getElementById('moodChart').getContext('2d');
            if(myChart) myChart.destroy();
            
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: userEntries.map(e => e.date),
                    datasets: [{
                        label: '기분 점수',
                        data: userEntries.map(e => e.score),
                        borderColor: '#6d9773',
                        backgroundColor: isDark ? 'rgba(109, 151, 115, 0.3)' : 'rgba(109, 151, 115, 0.1)',
                        fill: true
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    scales: { 
                        y: { min: 1, max: 5, ticks: { color: isDark ? '#aaa' : '#666' } },
                        x: { ticks: { color: isDark ? '#aaa' : '#666' } }
                    },
                    plugins: { legend: { labels: { color: isDark ? '#eee' : '#333' } } }
                }
            });
        }

        // 게시판 및 감정분석 로직 (기존과 동일)
        function postMsg() {
            const msg = document.getElementById('board-msg').value;
            if(!msg) return;
            const item = document.createElement('div');
            item.innerHTML = `<p><b>${currentUser ? currentUser.name : "익명"}:</b> ${msg}</p><hr style="border-color:var(--border-color)">`;
            document.getElementById('board-list').prepend(item);
            document.getElementById('board-msg').value = "";
        }

        async function openAnalysis() {
            document.getElementById('analysis-window').style.display = 'flex';
            const URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model/';
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(URL);
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                const v = document.getElementById('video');
                v.srcObject = stream;
                v.addEventListener('play', () => {
                    setInterval(async () => {
                        const det = await faceapi.detectAllFaces(v, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                        if(det.length > 0) {
                            const exp = det[0].expressions;
                            const max = Object.keys(exp).reduce((a, b) => exp[a] > exp[b] ? a : b);
                            document.getElementById('res-emotion').innerText = max.toUpperCase();
                        }
                    }, 500);
                });
            } catch(e) { alert("카메라를 연결할 수 없습니다."); }
        }
    </script>
</body>
</html>
